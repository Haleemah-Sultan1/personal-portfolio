<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@500;700&display=swap" rel="stylesheet" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Haleemah Malik — writer, developer, student. Portfolio." />
  <title>Haleemah Malik | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">

    <div id="splash-screen" class="splash-screen">
  <div class="splash-content">
    <div class="splash-log" id="splashLog"></div>
    <div class="splash-name-row">
      <div class="splash-name" id="splashName" dir="rtl"></div>
      <span class="splash-cursor" id="splashCursor"></span>
    </div>
  </div>
</div>
    
    <!-- Slim terminal-style prompt bar (top only — no full terminal) -->
    <header class="title-bar">
      <div class="title-bar-left">
        <span class="traffic-dot red"></span>
        <span class="traffic-dot yellow"></span>
        <span class="traffic-dot green"></span>
      </div>
      <div class="title-bar-center" id="titleBar">portfolio — Haleemah Malik</div>
      <div class="title-bar-right"></div>
    </header>

    <div class="prompt-bar" id="promptBar">
      <span class="prompt-user">haleemah</span><span class="prompt-at">@</span><span class="prompt-host">pakistan</span><span class="prompt-colon">:</span><span class="prompt-path">~/portfolio</span><span class="prompt-dollar">$</span>
      <span class="prompt-cmd" id="promptCmd">cat welcome.txt</span>
      <span class="prompt-cursor">▋</span>
    </div>

    <div class="workbench">
      <!-- Activity Bar -->
      <nav class="activity-bar" id="activityBar" aria-label="Sections"></nav>

      <!-- Sidebar / Explorer -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <span id="explorerTitle">EXPLORER</span>
        </div>
        <div class="sidebar-content">
          <div class="tree-folder open">
            <div class="tree-folder-label" id="folderLabel">
              <span class="chevron">▼</span>
              <span class="folder-icon">📁</span>
              <span id="folderName">portfolio</span>
            </div>
            <ul class="tree-files" id="fileTree"></ul>
          </div>
        </div>
      </aside>

      <!-- Editor -->
      <main class="editor-area">
        <div class="tabs" id="tabs"></div>
        <div class="editor-body">
          <div class="editor-scroll">
            <div class="line-numbers" id="lineNumbers"></div>
            <div class="editor-content" id="editorContent"></div>
          </div>
          <div class="minimap" id="minimap" aria-hidden="true"></div>
        </div>
      </main>
    </div>

    <!-- Status Bar -->
    <footer class="status-bar" id="statusBar">
      <div class="status-left">
        <span class="status-item branch" id="statusBranch">⎇ main</span>
        <span class="status-item" id="statusErrors">⊘ 0</span>
        <span class="status-item" id="statusWarnings">△ 0</span>
      </div>
      <div class="status-right">
        <span class="status-item" id="statusCursor">Ln 1, Col 1</span>
        <span class="status-item" id="statusIndent">Spaces: 2</span>
        <span class="status-item" id="statusEncoding">UTF-8</span>
        <span class="status-item" id="statusMode">Plain Text</span>
      </div>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
